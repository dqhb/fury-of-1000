<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>racer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; text-transform: uppercase;
        }

        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        
        .panel { background: rgba(20, 30, 40, 0.85); border: 2px solid #38bdf8; padding: 15px 25px; border-radius: 8px; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        
        h1 { margin: 0 0 5px 0; font-size: 2rem; color: #bae6fd; letter-spacing: 2px;}
        p { margin: 0; color: #7dd3fc; font-size: 0.9rem; letter-spacing: 1px;}

        #speedometer { font-size: 3.5rem; font-weight: bold; color: #fde047; text-shadow: 0 0 10px #facc15; text-align: right; }
        #speed-label { font-size: 1rem; color: #fef08a; }

        .checkbox-container {
            margin-top: 15px; display: flex; align-items: center; gap: 10px; cursor: pointer;
            color: #ef4444; font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 8px #ef4444;
        }
        .checkbox-container input { width: 20px; height: 20px; accent-color: #ef4444; cursor: pointer; }

        #reset-btn {
            margin-top: 15px;
            background: #38bdf8;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px #38bdf8;
            pointer-events: auto;
            width: 100%;
        }
        #reset-btn:hover { background: #bae6fd; }

        #controls { align-self: center; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; border: 1px solid #555; color: #aaa; font-size: 0.8rem; letter-spacing: 2px; pointer-events: none; }
        .highlight { color: #fff; font-weight: bold; }
        
        #alert-text { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem; color: #facc15; font-weight: bold; font-style: italic;
            text-shadow: 0 0 20px #f59e0b; opacity: 0; transition: opacity 0.2s; pointer-events: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="panel">
                <h1>racer</h1>
                <p>Distance: <span id="distance" style="color:#fff;">0</span> m</p>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="obstacle-toggle">
                    OBSTACLES
                </label>
                
                <button id="reset-btn">GO TO TRACK</button>
            </div>
            <div class="panel">
                <div id="speedometer">0</div>
                <div id="speed-label">KM/H</div>
            </div>
        </div>
        
        <div id="alert-text">DRIFTING!</div>

        <div id="controls">
            <span class="highlight">W</span> Thrust | <span class="highlight">A/D</span> Steer Left/Right | <span class="highlight">S</span> Brake | <span class="highlight">SPACE</span> Drift
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.0025);
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        const seed1 = Math.random() * 1000;
        const seed2 = Math.random() * 1000;
        const trackWidth = 22;

        function getTrackCenter(absZ) {
            return Math.sin(absZ * 0.003 + seed1) * 600 + Math.sin(absZ * 0.0015 + seed2) * 800;
        }

        const carGroup = new THREE.Group();
        scene.add(carGroup);
        carGroup.position.x = getTrackCenter(0);

        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xec4899, roughness: 0.2, metalness: 0.8 }); 
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1.0 });

        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 4.5), bodyMat);
        chassis.position.y = 0.4; carGroup.add(chassis);

        const nose = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1.8), bodyMat);
        nose.position.set(0, 0.25, -3.1); carGroup.add(nose);

        const fWing = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.6), whiteMat);
        fWing.position.set(0, 0.15, -3.8); carGroup.add(fWing);

        const rWing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.8), whiteMat);
        rWing.position.set(0, 1.1, 1.8); carGroup.add(rWing);
        
        const rWingSupport = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.4), blackMat);
        rWingSupport.position.set(0, 0.7, 1.8); carGroup.add(rWingSupport);

        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1.2), blackMat);
        cockpit.position.set(0, 0.7, 0.2); carGroup.add(cockpit);

        const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
        wheelGeo.rotateZ(Math.PI / 2);
        const wheels = [];
        const wheelPositions = [ [-1.1, 0.4, -2.5], [1.1, 0.4, -2.5], [-1.1, 0.4, 1.5], [1.1, 0.4, 1.5] ];
        
        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, blackMat);
            wheel.position.set(...pos);
            carGroup.add(wheel);
            wheels.push(wheel);
            const rim = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.05, 8, 16), rimMat);
            rim.rotateY(Math.PI / 2);
            rim.position.set(pos[0] > 0 ? 0.16 : -0.16, 0, 0);
            wheel.add(rim);
        });

        const groundGeo = new THREE.PlaneGeometry(3000, 3000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        scene.add(ground);

        const trackElements = [];
        const curbGeo = new THREE.BoxGeometry(2, 0.5, 8);
        const curbMat1 = new THREE.MeshStandardMaterial({ color: 0xffffff }); 
        const curbMat2 = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const bldgMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.5 });
        
        for (let i = 0; i < 80; i++) {
            let zPos = 40 - (i * 8);
            let mat = i % 2 === 0 ? curbMat1 : curbMat2;
            
            let cLeft = new THREE.Mesh(curbGeo, mat);
            scene.add(cLeft);
            trackElements.push({ mesh: cLeft, z: zPos, sideOffset: -trackWidth, isBuilding: false });

            let cRight = new THREE.Mesh(curbGeo, mat);
            scene.add(cRight);
            trackElements.push({ mesh: cRight, z: zPos, sideOffset: trackWidth, isBuilding: false });

            if (i % 3 === 0) {
                let hLeft = 20 + Math.random() * 60;
                let bLeft = new THREE.Mesh(new THREE.BoxGeometry(20, hLeft, 20), bldgMat);
                scene.add(bLeft);
                trackElements.push({ mesh: bLeft, z: zPos, sideOffset: -(trackWidth + 15), isBuilding: true, height: hLeft });

                let hRight = 20 + Math.random() * 60;
                let bRight = new THREE.Mesh(new THREE.BoxGeometry(20, hRight, 20), bldgMat);
                scene.add(bRight);
                trackElements.push({ mesh: bRight, z: zPos, sideOffset: trackWidth + 15, isBuilding: true, height: hRight });
            }
        }

        const obstacleToggle = document.getElementById('obstacle-toggle');
        let obstacles = [];
        const obsGeo = new THREE.BoxGeometry(3, 2, 3);
        const obsMat = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.6 }); 

        const keys = { w: false, a: false, s: false, d: false, space: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.code==='Space') keys.space = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if(e.code==='Space') keys.space = false; });

        let speed = 0;
        let maxSpeed = 4.5;
        let acceleration = 0.035;
        let braking = 0.06;
        let friction = 0.01;
        let steeringAngle = 0;
        let carRotation = 0; 
        let crashed = false;
        
        const uiSpeed = document.getElementById('speedometer');
        const uiDist = document.getElementById('distance');
        const alertText = document.getElementById('alert-text');
        const resetBtn = document.getElementById('reset-btn');

        resetBtn.addEventListener('click', () => {
            carGroup.position.x = getTrackCenter(-carGroup.position.z);
            speed = 0;
            carRotation = 0;
            steeringAngle = 0;
            crashed = false;
            alertText.style.opacity = 0;
        });

        function animate() {
            requestAnimationFrame(animate);

            let absZ = -carGroup.position.z;
            let currentCenter = getTrackCenter(absZ);
            let distFromCenter = Math.abs(carGroup.position.x - currentCenter);
            let isOffTrack = distFromCenter > trackWidth;

            if (isOffTrack && !crashed) {
                maxSpeed = 1.5;          
                friction = 0.08;         
                alertText.innerText = "OFF TRACK";
                alertText.style.color = "#ef4444";
                alertText.style.opacity = 1;
            } else if (!crashed) {
                maxSpeed = 4.5;
                friction = 0.01;
                if (!keys.space) alertText.style.opacity = 0; 
            }

            if (!crashed) {
                if (keys.w) speed += acceleration;
                if (keys.s) speed -= braking;
                if (!keys.w && !keys.s) speed -= friction;
            } else {
                speed -= braking; 
            }

            let currentTurnSpeed = 0.04;
            let grip = 0.15; 

            if (keys.space && speed > 0.5 && !isOffTrack && !crashed) {
                currentTurnSpeed = 0.08; 
                grip = 0.03; 
                speed -= friction * 2; 
                alertText.innerText = "DRIFTING!";
                alertText.style.color = "#facc15";
                alertText.style.opacity = 1;
            }

            speed = Math.max(0, Math.min(speed, maxSpeed)); 

            if (speed > 0.1 && !crashed) {
                if (keys.a) carRotation += currentTurnSpeed;
                if (keys.d) carRotation -= currentTurnSpeed;
            }
            if (!keys.a && !keys.d && !crashed) carRotation *= 0.88; 
            
            if(!crashed) steeringAngle += (carRotation - steeringAngle) * grip;

            carGroup.position.x -= Math.sin(steeringAngle) * speed;
            carGroup.position.z -= Math.cos(steeringAngle) * speed;
            carGroup.rotation.y = carRotation;

            ground.position.x = carGroup.position.x;
            ground.position.z = carGroup.position.z;

            wheels.forEach(w => w.rotation.x -= speed * 0.5);
            wheels[0].rotation.z = carRotation * 1.5; wheels[1].rotation.z = carRotation * 1.5;

            trackElements.forEach(m => {
                if (m.z > carGroup.position.z + 50) m.z -= 640; 
                m.mesh.position.z = m.z;
                m.mesh.position.x = getTrackCenter(-m.z) + m.sideOffset; 
                if (m.isBuilding) {
                    m.mesh.position.y = m.height / 2;
                } else {
                    m.mesh.position.y = 0.25;
                }
            });

            if (obstacleToggle.checked && !crashed) {
                if (Math.random() < 0.05 && speed > 1) {
                    let obs = new THREE.Mesh(obsGeo, obsMat);
                    let spawnZ = carGroup.position.z - 400;
                    let randomOffset = (Math.random() * (trackWidth * 1.6)) - (trackWidth * 0.8); 
                    obs.position.set(getTrackCenter(-spawnZ) + randomOffset, 1, spawnZ);
                    scene.add(obs);
                    obstacles.push({ mesh: obs, internalOffset: randomOffset });
                }
            } else if (!obstacleToggle.checked && obstacles.length > 0) {
                obstacles.forEach(o => scene.remove(o.mesh));
                obstacles = [];
                crashed = false; 
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.mesh.position.x = getTrackCenter(-obs.mesh.position.z) + obs.internalOffset;

                if (!crashed &&
                    Math.abs(obs.mesh.position.z - carGroup.position.z) < 4.0 && 
                    Math.abs(obs.mesh.position.x - carGroup.position.x) < 2.5) {
                    
                    crashed = true;
                    speed = 0;
                    carRotation += Math.PI; 
                    alertText.innerText = "CRASHED!";
                    alertText.style.color = "#ef4444";
                    alertText.style.opacity = 1;
                }

                if (obs.mesh.position.z > carGroup.position.z + 20) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                }
            }

            camera.position.x = carGroup.position.x + Math.sin(carRotation) * 15;
            camera.position.y = 5.5;
            camera.position.z = carGroup.position.z + Math.cos(carRotation) * 15;
            camera.lookAt(carGroup.position.x, carGroup.position.y, carGroup.position.z - 5);

            uiSpeed.innerText = Math.floor(speed * 110); 
            uiDist.innerText = Math.floor(Math.max(0, absZ));

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
